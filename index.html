<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANGMELIMA SHIELD - Terminal Universel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0B0E11; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: #161A1E; border: 1px solid #2B3139; border-radius: 1.5rem; }
        .feature-btn { cursor: pointer; transition: all 0.2s; }
        .feature-btn:active { transform: scale(0.9); opacity: 0.7; }
        .icon-box { width: 56px; height: 56px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
        #signal-overlay { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4">

    <div id="signal-display" class="hidden glass-card p-4 mb-4 border-l-4 border-emerald-500 bg-emerald-500/10">
        <div class="flex justify-between items-center">
            <div>
                <p id="signal-asset" class="text-xs font-black text-emerald-400 uppercase"></p>
                <p id="signal-desc" class="text-[10px] text-white"></p>
            </div>
            <button onclick="closeSignal()" class="text-gray-500 text-xs">✕</button>
        </div>
    </div>

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-black">TradingGain</h1>
        <div class="bg-yellow-500 text-black text-[10px] font-bold px-3 py-1 rounded-full italic">⭐ PRO</div>
    </div>

    <div class="glass-card p-6 grid grid-cols-4 gap-y-8 gap-x-2 text-center">
        <div class="feature-btn flex flex-col items-center" onclick="showExplain('AI Chat', 'Discute avec ton IA pour valider ton setup selon tes règles SMC/ICT.')">
            <div class="icon-box bg-emerald-900/20 text-emerald-400"><i class="fas fa-robot text-xl"></i></div>
            <span class="text-[8px] text-gray-400">AI Chat</span>
        </div>
        <div class="feature-btn flex flex-col items-center" onclick="showExplain('Analysis', 'Analyse technique profonde : identifie les Order Blocks et les FVG automatiquement.')">
            <div class="icon-box bg-blue-900/20 text-blue-400"><i class="fas fa-chart-line text-xl"></i></div>
            <span class="text-[8px] text-gray-400">Analysis</span>
        </div>
        <div class="feature-btn flex flex-col items-center" onclick="triggerSignalTest()">
            <div class="icon-box bg-red-900/20 text-red-400"><i class="fas fa-bullseye text-xl"></i></div>
            <span class="text-[8px] text-gray-400">Opports.</span>
        </div>
        <div class="feature-btn flex flex-col items-center" onclick="showExplain('L/S Ratio', 'Ratio Achat/Vente global. Si trop de Longs, prépare un sweep vers le bas.')">
            <div class="icon-box bg-purple-900/20 text-purple-400"><i class="fas fa-balance-scale text-xl"></i></div>
            <span class="text-[8px] text-gray-400">L/S Ratio</span>
        </div>

        <div class="feature-btn flex flex-col items-center" onclick="openPnL()">
            <div class="icon-box bg-yellow-900/20 text-yellow-400"><i class="fas fa-calculator text-xl"></i></div>
            <span class="text-[8px] text-gray-400">PnL Calc</span>
        </div>
        </div>

    <div id="info-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-50">
        <div class="glass-card w-full p-6 text-center border-t-2 border-emerald-500">
            <h3 id="info-title" class="font-bold text-emerald-400 mb-2"></h3>
            <p id="info-text" class="text-xs text-gray-400 mb-6"></p>
            <button onclick="closeInfo()" class="bg-gray-800 px-6 py-2 rounded-xl text-[10px] font-bold uppercase">Compris</button>
        </div>
    </div>

    <script>
        // Fonctions d'Interactivité
        function showExplain(title, text) {
            document.getElementById('info-title').innerText = title;
            document.getElementById('info-text').innerText = text;
            document.getElementById('info-modal').classList.remove('hidden');
        }

        function closeInfo() {
            document.getElementById('info-modal').classList.add('hidden');
        }

        // Système de Signal (Il vient du Bot Python ou du Web)
        function triggerSignalTest() {
            const signalDiv = document.getElementById('signal-display');
            document.getElementById('signal-asset').innerText = "🚨 CRT DETECTED: NAS100";
            document.getElementById('signal-desc').innerText = "B2 Sweep High. Attente réintégration pour entrée Sniper.";
            signalDiv.classList.remove('hidden');
            // Son de notification (Optionnel)
            window.navigator.vibrate([100, 30, 100]);
        }

        function closeSignal() {
            document.getElementById('signal-display').classList.add('hidden');
        }
    </script>
</body>
    </html>
