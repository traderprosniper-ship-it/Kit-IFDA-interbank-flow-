<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACKSNIPER SMC - Terminal Universel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0B0E11; color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: #161A1E; border: 1px solid #2B3139; border-radius: 1.5rem; }
        .icon-btn { width: 56px; height: 56px; border-radius: 18px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: 0.2s; }
        .icon-btn:active { transform: scale(0.9); }
        .badge-new { position: absolute; -top-1; -right-1; background: #EAB308; color: black; font-size: 7px; font-weight: 900; padding: 1px 4px; border-radius: 4px; }
        .market-card { min-width: 135px; background: #1A1F26; border-radius: 1.25rem; padding: 1rem; border: 1px solid #2B3139; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 pb-10">

    <div id="live-alert" class="hidden glass-card p-4 mb-4 border-l-4 border-emerald-500 bg-emerald-500/10 animate-pulse">
        <div class="flex justify-between items-center text-[10px]">
            <div>
                <p id="alert-title" class="font-black text-emerald-400 uppercase"></p>
                <p id="alert-desc" class="text-white">Sweep détecté ! Vérifie TradingView.</p>
            </div>
            <a id="alert-link" target="_blank" class="bg-emerald-500 text-black px-2 py-1 rounded font-bold">GRAPH</a>
        </div>
    </div>

    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
            <div class="p-2 bg-emerald-500/10 rounded-xl"><i class="fas fa-crosshairs text-emerald-400"></i></div>
            <h1 class="text-xl font-black">Trading Interbank Flow</h1>
        </div>
        <div class="bg-yellow-500 text-black text-[10px] font-black px-3 py-1 rounded-full italic italic tracking-tighter">⭐ PRO</div>
    </div>

    <div class="glass-card p-4 mb-5 flex justify-between text-center divide-x divide-gray-800">
        <div><p class="text-emerald-400 font-bold text-lg">70%</p><p class="text-[8px] text-gray-500 uppercase">Win Rate</p></div>
        <div><p class="text-white font-bold text-lg">108</p><p class="text-[8px] text-gray-500 uppercase">Signals</p></div>
        <div><p class="text-red-500 font-bold text-lg">32</p><p class="text-[8px] text-gray-500 uppercase">SL</p></div>
        <div><p class="text-emerald-400 font-bold text-lg">+270%</p><p class="text-[8px] text-gray-500 uppercase">P&L</p></div>
    </div>

    <div class="flex justify-between items-center mb-4 px-1 text-[10px] font-bold uppercase text-gray-500">
        <span>📈 Live Market (Crypto/Indices)</span>
    </div>
    <div id="market-ticker" class="flex gap-3 overflow-x-auto pb-4 mb-6">
        </div>

    <div class="glass-card p-6 grid grid-cols-4 gap-y-8 gap-x-2 text-center mb-6">
        <div class="flex flex-col items-center" onclick="showInfo('AI Chat', 'Discute avec ton IA Shield pour valider tes confluences SMC.')">
            <div class="icon-btn bg-emerald-900/20 text-emerald-400"><span class="badge-new">NEW</span><i class="fas fa-robot"></i></div>
            <span class="text-[8px] text-gray-400 mt-1">AI Chat</span>
        </div>
        <div class="flex flex-col items-center" onclick="showInfo('Analysis', 'Détection automatique des OB et FVG sur l\'actif sélectionné.')">
            <div class="icon-btn bg-blue-900/20 text-blue-400"><i class="fas fa-chart-line"></i></div>
            <span class="text-[8px] text-gray-400 mt-1">Analysis</span>
        </div>
        <div class="flex flex-col items-center" onclick="showInfo('Opportunities', 'Liste des setups CRT H4 en attente de réintégration.')">
            <div class="icon-btn bg-red-900/20 text-red-400"><i class="fas fa-bullseye"></i></div>
            <span class="text-[8px] text-gray-400 mt-1 leading-tight">Opports.</span>
        </div>
        <div class="flex flex-col items-center" onclick="showInfo('L/S Ratio', 'Volume institutionnel : Qui est piégé ?')">
            <div class="icon-btn bg-purple-900/20 text-purple-400"><i class="fas fa-balance-scale"></i></div>
            <span class="text-[8px] text-gray-400 mt-1 text-center">L/S Ratio</span>
        </div>
        <div class="flex flex-col items-center" onclick="openPnL()">
            <div class="icon-btn bg-yellow-900/20 text-yellow-400"><span class="badge-new">NEW</span><i class="fas fa-calculator"></i></div>
            <span class="text-[8px] text-gray-400 mt-1">PnL Calc</span>
        </div>
        <div class="flex flex-col items-center" onclick="showInfo('AI Trends', 'Divergence SMT entre NAS100 et US30.')">
            <div class="icon-btn bg-cyan-900/20 text-cyan-400"><span class="badge-new">NEW</span><i class="fas fa-brain"></i></div>
            <span class="text-[8px] text-gray-400 mt-1">AI Trends</span>
        </div>
    </div>

    <div id="pnl-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-6 z-50">
        <div class="glass-card w-full p-6 text-center">
            <h3 class="text-yellow-400 font-bold mb-4 uppercase text-[10px]">Sniper Calc (25$)</h3>
            <input id="entry" type="number" placeholder="Entrée M5" class="w-full bg-black border border-gray-700 p-2 rounded mb-2 text-sm">
            <input id="sl" type="number" placeholder="SL Mèche B2" class="w-full bg-black border border-gray-700 p-2 rounded mb-4 text-sm">
            <button onclick="calculateLot()" class="w-full bg-[#00FF94] text-black font-black p-2 rounded text-xs">CALCULER</button>
            <p id="lot-res" class="mt-4 text-white font-bold"></p>
            <button onclick="closePnL()" class="mt-4 text-[8px] text-gray-500 uppercase underline">Fermer</button>
        </div>
    </div>

    <div id="info-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-50">
        <div class="glass-card w-full p-6 text-center border-t-4 border-emerald-500">
            <h3 id="info-title" class="text-emerald-400 font-bold mb-2"></h3>
            <p id="info-text" class="text-[10px] text-gray-400 mb-6"></p>
            <button onclick="closeInfo()" class="bg-white text-black px-6 py-2 rounded-full font-bold text-[10px]">COMPRIS</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        function showInfo(t, txt) { 
            document.getElementById('info-title').innerText = t;
            document.getElementById('info-text').innerText = txt;
            document.getElementById('info-modal').classList.remove('hidden');
        }
        function closeInfo() { document.getElementById('info-modal').classList.add('hidden'); }
        function openPnL() { document.getElementById('pnl-modal').classList.remove('hidden'); }
        function closePnL() { document.getElementById('pnl-modal').classList.add('hidden'); }

        function calculateLot() {
            const entry = parseFloat(document.getElementById('entry').value);
            const sl = parseFloat(document.getElementById('sl').value);
            if(entry && sl) {
                const lot = (1.25 / Math.abs(entry - sl)).toFixed(2);
                document.getElementById('lot-res').innerText = "LOT SNIPER: " + lot;
            }
        }

        // Simuler la réception d'un signal du Bot Python
        window.addEventListener('message', (event) => {
            if(event.data.type === 'SIGNAL') {
                document.getElementById('live-alert').classList.remove('hidden');
                document.getElementById('alert-title').innerText = "🎯 CRT: " + event.data.asset;
                document.getElementById('alert-link').href = event.data.url;
            }
        });
    </script>
</body>
                </html>
